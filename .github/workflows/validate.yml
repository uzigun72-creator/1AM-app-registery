name: Validate Registry

on:
  pull_request:
    branches: [main]
    paths: ['registry.json', 'icons/**']
  push:
    branches: [main]
    paths: ['registry.json', 'icons/**']

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate registry.json
        run: node validate.js

      - name: Check JSON syntax
        run: python3 -c "import json; json.load(open('registry.json'))" && echo "✓ Valid JSON"
